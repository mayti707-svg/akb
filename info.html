<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Алтыншебер</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:45px;
max-width:700px;
width:100%;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.35);
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:42px;
margin-bottom:20px;
color:#FFD700;
}

h2{
font-size:24px;
margin-bottom:25px;
}

p{
font-size:20px;
line-height:1.7;
}

.buttons{
margin-top:35px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:12px 28px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:17px;
font-weight:bold;
transition:.3s;
background:#FFD700;
color:#222;
}

button:hover{
transform:scale(1.05);
background:#fff;
}

footer{
margin-top:35px;
font-size:15px;
opacity:.8;
}

@media(max-width:600px){

.card{
padding:30px 20px;
}

h1{
font-size:32px;
}

h2{
font-size:20px;
}

p{
font-size:18px;
}

button{
width:140px;
}

}
</style>

</head>
<body>

<div class="card">

<h1>🏆 Алтыншебер</h1>

<h2 id="title">Конкурс завершён</h2>

<p id="text">
Уважаемые коллеги!<br><br>
Конкурс <b>«Алтыншебер»</b> завершён.<br>
Благодарим всех участников за проявленный интерес,
активность и профессионализм!
</p>

<div class="buttons">
<button onclick="ru()">Русский</button>
<button onclick="kk()">Қазақша</button>
</div>

<footer>
© Алтыншебер
</footer>

</div>

<script>

function ru(){

document.documentElement.lang="ru";

document.getElementById("title").innerHTML="Конкурс завершён";

document.getElementById("text").innerHTML=
`Уважаемые коллеги!<br><br>
Конкурс <b>«Алтыншебер»</b> завершён.<br>
Благодарим всех участников за проявленный интерес,
активность и профессионализм!`;

}

function kk(){

document.documentElement.lang="kk";

document.getElementById("title").innerHTML="Байқау аяқталды";

document.getElementById("text").innerHTML=
`Құрметті әріптестер!<br><br>
<b>«Алтыншебер»</b> байқауы аяқталды.<br>
Барлық қатысушыларға белсенділігі, қызығушылығы және кәсібилігі үшін алғысымызды білдіреміз!`;

}

</script>

</body>
</html>
