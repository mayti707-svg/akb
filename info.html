<script>
/*
    Цифровой фон без библиотек.
    Работает локально, в GitHub Pages и внутри Android WebView.
*/

const canvas = document.getElementById("digital-bg");
const ctx = canvas.getContext("2d");

let particles = [];
let mouse = {
    x: null,
    y: null
};

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createParticles();
}

function createParticles() {
    particles = [];

    const count = window.innerWidth < 600 ? 45 : 90;

    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2.5 + 1,
            speedX: (Math.random() - 0.5) * 0.7,
            speedY: (Math.random() - 0.5) * 0.7,
            color: Math.random() > 0.78 ? "#FFD700" : "#60a5fa"
        });
    }
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 14;
        ctx.shadowColor = p.color;
        ctx.fill();
        ctx.shadowBlur = 0;

        for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            const dx = p.x - p2.x;
            const dy = p.y - p2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 145) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(96, 165, 250, ${1 - distance / 145})`;
                ctx.lineWidth = 0.7;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }

        if (mouse.x && mouse.y) {
            const dxMouse = p.x - mouse.x;
            const dyMouse = p.y - mouse.y;
            const mouseDistance = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

            if (mouseDistance < 180) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 215, 0, ${1 - mouseDistance / 180})`;
                ctx.lineWidth = 1;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(drawParticles);
}

window.addEventListener("resize", resizeCanvas);

window.addEventListener("mousemove", function(event) {
    mouse.x = event.clientX;
    mouse.y = event.clientY;
});

window.addEventListener("touchmove", function(event) {
    if (event.touches.length > 0) {
        mouse.x = event.touches[0].clientX;
        mouse.y = event.touches[0].clientY;
    }
});

resizeCanvas();
drawParticles();
</script>
